spring:
  application:
    name: api-gateway

server:
  port: 8080

cloud:

    gateway:

      routes:


        - id: authentication-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**


        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**


        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**


        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/inventory/**


        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/payments/**


        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/notifications/**